version: '3.8'

# ============================================================
# docker-compose.prod.yml
# Dùng trên máy DEMO — pull image từ Docker Hub, không build
#
# Lệnh chạy:
#   docker-compose -f docker-compose.prod.yml pull
#   docker-compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ── Infrastructure ──────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: es-demo
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - shop-network

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: kibana-demo
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - shop-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres-demo
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=orders_db
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shop-network

  db-seeder:
    image: postgres:15-alpine
    container_name: db-seeder-demo
    environment:
      - PGPASSWORD=password
    volumes:
      - ./seed_data.sql:/seed_data.sql:ro
    command: >
      sh -c "psql -h postgres -U user -d orders_db -f /seed_data.sql"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shop-network
    restart: on-failure

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq-demo
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
    networks:
      - shop-network

  redis:
    image: redis:7-alpine
    container_name: redis-demo
    ports:
      - "6379:6379"
    networks:
      - shop-network

  # ── Custom Services (pull từ Docker Hub) ────────────────────

  search-service:
    image: trandaitai/search-service:latest
    container_name: search-service-demo
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - shop-network

  order-service:
    image: trandaitai/order-service:latest
    container_name: order-service-demo
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - DB_URL=postgres://user:password@postgres:5432/orders_db
    depends_on:
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - shop-network

  indexer-service:
    image: trandaitai/indexer-service:latest
    container_name: indexer-service-demo
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672
      - POSTGRES_URL=postgres://user:password@postgres:5432/orders_db
    depends_on:
      elasticsearch:
        condition: service_started
      rabbitmq:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - shop-network

  user-service:
    image: trandaitai/user-service:latest
    container_name: user-service-demo
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/orders_db
      - JWT_SECRET=your-secret-key
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shop-network

  product-service:
    image: trandaitai/product-service:latest
    container_name: product-service-demo
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/orders_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shop-network

  web-frontend:
    image: trandaitai/web-frontend:latest
    container_name: web-frontend-demo
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - shop-network

  # ── API Gateway ─────────────────────────────────────────────

  gateway:
    image: nginx:alpine
    container_name: gateway-demo
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - search-service
      - order-service
      - product-service
      - user-service
      - web-frontend
    networks:
      - shop-network

networks:
  shop-network:
    driver: bridge

volumes:
  postgres-data:
