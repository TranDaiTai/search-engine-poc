version: '3.8'

services:
  # Search Engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: es-demo
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - shop-network

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: kibana-demo
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - shop-network

  # Database (Source of Truth)
  postgres:
    image: postgres:15-alpine
    container_name: postgres-demo
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=orders_db
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orders_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shop-network

  # Seed dữ liệu mẫu (chạy 1 lần sau khi postgres healthy)
  db-seeder:
    image: postgres:15-alpine
    container_name: db-seeder-demo
    environment:
      - PGPASSWORD=password
    volumes:
      - ../../seed_data.sql:/seed_data.sql:ro
    command: >
      sh -c "psql -h postgres -U user -d orders_db -f /seed_data.sql"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shop-network
    restart: on-failure

  # pgAdmin (Web-based Database Manager) - truy cập tại http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-demo
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin_servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shop-network

  # Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq-demo
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
    networks:
      - shop-network

  # Stock Reservation (High Performance)
  redis:
    image: redis:7-alpine
    container_name: redis-demo
    ports:
      - "6379:6379"
    networks:
      - shop-network

  # API Gateway (Nginx)
  gateway:
    image: nginx:alpine
    container_name: gateway-demo
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - search-service
      - order-service
      - web-frontend
    networks:
      - shop-network

  # Search API (Person A)
  search-service:
    build: ../../services/search-service
    container_name: search-service-demo
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - shop-network

  # Order Service (Person B)
  order-service:
    build: ../../services/order-service
    container_name: order-service-demo
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
      - DB_URL=postgres://user:password@postgres:5432/orders_db
    depends_on:
      - rabbitmq
      - redis
      - postgres
    networks:
      - shop-network

  # Indexer Worker (Person B)
  indexer-service:
    build: ../../services/indexer-service
    container_name: indexer-service-demo
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672
      - POSTGRES_URL=postgres://user:password@postgres:5432/orders_db
    depends_on:
      - elasticsearch
      - rabbitmq
      - postgres
    networks:
      - shop-network

  # Web Frontend (UI)
  web-frontend:
    build: 
      context: ../../services/web-frontend-next
      args:
        - NEXT_PUBLIC_API_URL=http://localhost/api
    container_name: web-frontend-demo
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - shop-network

  # User & Authentication Service
  user-service:
    build: ../../services/user-service
    container_name: user-service-demo
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/orders_db
      - JWT_SECRET=your-secret-key
    depends_on:
      - postgres
    networks:
      - shop-network

  # Product & Catalog Service
  product-service:
    build: ../../services/product-service
    container_name: product-service-demo
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/orders_db
    depends_on:
      - postgres
    networks:
      - shop-network

networks:
  shop-network:
    driver: bridge
