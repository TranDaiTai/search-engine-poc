apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  ports:
    - port: 80
      targetPort: 3001
  selector:
    app: order-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: your-docker-hub/order-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: RABBITMQ_URL
              value: "amqp://user:password@rabbitmq:5672"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: DB_URL
              value: "postgres://user:password@postgres:5432/orders_db"
