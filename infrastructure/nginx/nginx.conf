worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Gzip settings
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name localhost;

        # Frontend
        location / {
            proxy_pass http://web-frontend-demo:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth Service
        location /api/auth {
            proxy_pass http://user-service-demo:3003/auth;
            proxy_set_header Host $host;
        }

        # User Service
        location /api/user {
            proxy_pass http://user-service-demo:3003/user;
            proxy_set_header Host $host;
        }

        # Product Service (Backend - POST / PUT / DELETE)
        location /api/products {
            proxy_pass http://product-service-demo:3001/products;
            proxy_set_header Host $host;
        }

        # Categories through Search Service (Expert migration to ES)
        location /api/categories {
            proxy_pass http://search-service-demo:3000/search/categories;
            proxy_set_header Host $host;
        }
    
        # Search & suggestions
        location /api/search {
            proxy_pass http://search-service-demo:3000/search;
            proxy_set_header Host $host;
        }

        # Order Service
        location /api/order {
            proxy_pass http://order-service-demo:3001/order;
            proxy_set_header Host $host;
        }

        location /health {
            return 200 '{"status":"OK"}';
            add_header Content-Type application/json;
        }
    }
}
