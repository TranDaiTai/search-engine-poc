events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Frontend
        location / {
            proxy_pass http://web-frontend-demo:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # User Service - dùng trailing slash ở cả location VÀ proxy_pass
        # Nginx sẽ thay thế /api/auth/ bằng / khi forward
        location /api/auth/ {
            proxy_pass http://user-service-demo:3000/auth/;
            proxy_set_header Host $host;
        }

        location /api/users/ {
            proxy_pass http://user-service-demo:3000/users/;
            proxy_set_header Host $host;
        }

        # Product Service
        location /api/products/ {
            proxy_pass http://product-service-demo:3001/products/;
            proxy_set_header Host $host;
        }

        location /api/categories/ {
            proxy_pass http://product-service-demo:3001/categories/;
            proxy_set_header Host $host;
        }

        # Search & Order (giữ nguyên như cũ)
        location /api/search/ {
            proxy_pass http://search-service-demo:3000/search/;
            proxy_set_header Host $host;
        }

        location /api/order/ {
            proxy_pass http://order-service-demo:3001/order/;
            proxy_set_header Host $host;
        }

        location /health {
            return 200 '{"status":"OK"}';
            add_header Content-Type application/json;
        }
    }
}
