worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Use Docker's internal DNS — resolve at runtime, not at startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip settings
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name localhost;

        # Frontend
        location / {
            set $upstream_frontend http://web-frontend:3000;
            proxy_pass $upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth Service
        location /api/auth/ {
            set $upstream_user http://user-service:3000;
            rewrite ^/api/auth/(.*) /auth/$1 break;
            proxy_pass $upstream_user;
            proxy_set_header Host $host;
        }

        # User Service
        location /api/user/ {
            set $upstream_user http://user-service:3000;
            rewrite ^/api/user/(.*) /users/$1 break;
            proxy_pass $upstream_user;
            proxy_set_header Host $host;
        }

        # Product Service
        location /api/products {
            set $upstream_product http://product-service:3001;
            rewrite ^/api/products(.*) /products$1 break;
            proxy_pass $upstream_product;
            proxy_set_header Host $host;
        }

        # Categories through Search Service
        location /api/categories {
            set $upstream_search http://search-service:3000;
            rewrite ^/api/categories(.*) /search/categories$1 break;
            proxy_pass $upstream_search;
            proxy_set_header Host $host;
        }

        # Search & suggestions
        location /api/search {
            set $upstream_search http://search-service:3000;
            rewrite ^/api/search(.*) /search$1 break;
            proxy_pass $upstream_search;
            proxy_set_header Host $host;
        }

        # Order Service
        location /api/order {
            set $upstream_order http://order-service:3001;
            rewrite ^/api/order(.*) /order$1 break;
            proxy_pass $upstream_order;
            proxy_set_header Host $host;
        }

        location /health {
            return 200 '{"status":"OK"}';
            add_header Content-Type application/json;
        }
    }
}
