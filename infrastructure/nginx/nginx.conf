# ==========================================
# CẤU HÌNH NGINX LÀM API GATEWAY / LOAD BALANCER
# ==========================================

# Khối events thiết lập số luồng kết nối tối đa.
events {
    worker_connections 1024; # Nginx có thể xử lý tối đa 1024 kết nối cùng lúc.
}

# Khối http chứa toàn bộ cấu hình mạng lưới web của hệ thống
http {
    
    # ==========================================
    # CẤU HÌNH GZIP TỐI ƯU HÓA TỐC ĐỘ (NÉN DỮ LIỆU)
    # ==========================================
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;      # Mức độ nén (1-9). Mức 6 là cân bằng tốt nhất giữa tốc độ và dung lượng CPU.
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;    # Chỉ nén các file có dung lượng > 256 bytes
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ==========================================
    # CẤU HÌNH BẢO MẬT (SECURITY HEADERS)
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN" always; # Ngăn chặn Clickjacking (không cho nhúng trang web vào iframe lạ)
    add_header X-XSS-Protection "1; mode=block" always; # Bật bộ lọc XSS của trình duyệt
    add_header X-Content-Type-Options "nosniff" always; # Ngăn trình duyệt tự đoán định dạng file (chống MIME sniffing)
    add_header Referrer-Policy "no-referrer-when-downgrade" always; # Không gửi dữ liệu nguồn nếu truy cập từ HTTPS xuống HTTP

    # ---------------------------------------------------------
    # 1. ĐỊNH NGHĨA CÁC ĐIỂM ĐẾN (UPSTREAM / BACKEND SERVICES)
    # ---------------------------------------------------------
    
    # Định nghĩa dịch vụ Tìm kiếm. "search-service" chính là tên container trong docker-compose.
    upstream search_api {
        server search-service:3000; # Trỏ luồng dữ liệu về cổng 3000 của container này
    }

    # Định nghĩa dịch vụ Đặt hàng. 
    upstream order_api {
        server order-service:3001; # Trỏ về cổng 3001 của container order-service
    }

    # Định nghĩa dịch vụ Giao diện web (Next.js SSR).
    upstream web_frontend {
        server web-frontend:3000; # Trỏ về cổng 3000 bên trong container Next.js
    }

    # ---------------------------------------------------------
    # 2. MÁY CHỦ GATEWAY LẮNG NGHE TỪ BÊN NGOÀI
    # ---------------------------------------------------------
    server {
        listen 80; # Nginx hoạt động như một "Bảo vệ cổng", đứng gác ở cổng HTTP mặc định.

        # ==========================================
        # CẤU HÌNH SSL/TLS BẢO MẬT KẾT NỐI (HTTPS)
        # ==========================================
        # Bật các dòng dưới đây khi bạn đã mua Chứng chỉ số (SSL Certificate) từ Let's Encrypt hoặc Cloudflare.
        
        # listen 443 ssl http2;
        # ssl_certificate     /etc/nginx/certs/fullchain.pem; # Đường dẫn tới file public key
        # ssl_certificate_key /etc/nginx/certs/privkey.pem;   # Đường dẫn tới file private key chân thực
        
        # Tối ưu hóa cấu hình SSL (Chuẩn hiện đại)
        # ssl_session_timeout 1d;
        # ssl_session_cache shared:MozSSL:10m;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        # ssl_prefer_server_ciphers off;
        # add_header Strict-Transport-Security "max-age=63072000" always; # Bắt buộc phải dùng HTTPS vĩnh viễn (HSTS)

        # (TÙY CHỌN): Tự động ép người dùng truy cập từ HTTP sang HTTPS
        # if ($scheme != "https") {
        #     return 301 https://$host$request_uri;
        # }

        # ----- CÁC QUY TẮC CHIA YÊU CẦU (ROUTING RULES) -----

        # [QUY TẮC 1]: Khi truy cập thư mục gốc (Ví dụ: http://localhost/)
        location / {
            # Tiễn khách hàng đến xem giao diện trang web
            proxy_pass http://web_frontend;
            
            # Chép lại thông tin trình duyệt và IP gốc của khách hàng
            # để Container Frontend nhận diện được khách đang dùng máy gì
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # [QUY TẮC 2]: Khi Giao diện ngầm gọi API để Tìm kiếm (Ví dụ: http://localhost/search?q=iphone)
        location /search {
            # Bẻ hướng yêu cầu này đi thẳng vào container search-service
            proxy_pass http://search_api;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # [QUY TẮC 3]: Khi Giao diện ngầm gọi API để Đặt mua hàng (Ví dụ: HTTP POST http://localhost/order)
        location /order {
            # Bật kiểm tra JWT (Tắt comment khi đã có Token thật)
            # access_by_lua_block {
            #     local jwt = require("resty.jwt")
            #     local auth_header = ngx.var.http_Authorization
            #     if not auth_header then
            #         ngx.status = 401
            #         ngx.say('{"error": "Missing Authorization header"}')
            #         ngx.exit(401)
            #     end
            #
            #     local token = string.sub(auth_header, 8) -- Bỏ qua chữ "Bearer "
            #     local jwt_obj = jwt:verify("your-secret-key", token)
            #     if not jwt_obj.verified then
            #         ngx.status = 401
            #         ngx.say('{"error": "Invalid token: ' .. (jwt_obj.reason or "unknown") .. '"}')
            #         ngx.exit(401)
            #     end
            # }

            # Bẻ hướng yêu cầu này đi thẳng vào container order-service
            proxy_pass http://order_api;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # [QUY TẮC 4]: Lỗ hổng kỹ thuật dành riêng cho việc kiểm tra tình trạng hệ thống
        location /health {
            return 200 "OK"; # Trả ngay chữ OK mà không gọi đi đau hết
        }
    }
}
