events {
    worker_connections 1024;
}

http {
    upstream search_api {
        server search-service:3000;
    }

    upstream order_api {
        server order-service:3001;
    }

    server {
        listen 80;

        # Search Path (Person A)
        location /search {
            proxy_pass http://search_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Order Path (Person B)
        location /order {
            proxy_pass http://order_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check
        location /health {
            return 200 "OK";
        }
    }
}
